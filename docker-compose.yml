services:
  lattice:
    build: .
    container_name: lattice-app
    ports:
      - "5173:5173"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/auth/login" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: lattice-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lattice
    ports:
      - "5432:5432"
    command: [ "postgres", "-c", "wal_level=logical" ]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d lattice" ]
      interval: 5s
      timeout: 5s
      retries: 5
